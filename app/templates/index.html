{% extends "base.html" %}
{% block content %}
<div class="row">
  <div class="col-lg-7">
    <div class="card shadow-sm">
      <div class="card-header bg-success text-white">Envoyer votre ordonnance</div>
      <div class="card-body">
        <form action="{{ url_for('main.ordonnance') }}" method="post" enctype="multipart/form-data">
          <div class="mb-3">
            <label class="form-label">Nom complet</label>
            <input type="text" class="form-control" name="customer_name" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Téléphone (pour notification)</label>
            <input type="text" class="form-control" name="phone" placeholder="+221...">
          </div>
          <div class="mb-3">
            <label class="form-label">Email (pour notification)</label>
            <input type="email" class="form-control" name="email" placeholder="votre@email.com">
          </div>
          <div class="mb-3">
            <label class="form-label">Produits demandés</label>
            <input type="text" class="form-control" name="items_text" placeholder="Ex: Paracétamol 500mg, Ibuprofène 400mg" required>
            <div class="form-text">Séparez les produits par des virgules.</div>
          </div>
          <div class="mb-3">
            <label class="form-label">Ordonnance (image/pdf, optionnel)</label>
            <input type="file" class="form-control" name="file" accept=".png,.jpg,.jpeg,.pdf">
          </div>
          <button type="submit" class="btn btn-success">Envoyer</button>
        </form>
      </div>
    </div>
  </div>
  <div class="col-lg-5">
    <div class="card mb-3 shadow-sm">
      <div class="card-body text-center">
        <img src="{{ url_for('static', filename='2.jpg') }}"
             alt="Image pharmacie"
             class="img-fluid rounded shadow-sm"
             style="max-height: 220px; width: 100%; object-fit: cover;"
             onerror="this.onerror=null;this.src='https://images.unsplash.com/photo-1576091160550-2173dba999ef?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80';">
      </div>
    </div>
    <div class="card shadow-sm">
      <div class="card-header bg-success text-white">Stock actuel</div>
      <ul class="list-group list-group-flush">
        {% for p in products %}
        <li class="list-group-item d-flex justify-content-between align-items-center">
          {{ p.name }}
          <span class="badge rounded-pill {{ 'bg-success' if p.quantity>0 else 'bg-danger' }}">{{ p.quantity }}</span>
        </li>
        {% endfor %}
      </ul>
    </div>
  </div>
{% endblock %}
