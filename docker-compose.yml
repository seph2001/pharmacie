services:
  db:
    image: postgres:15
    container_name: pharma_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: pharma
      POSTGRES_PASSWORD: pharma_pw
      POSTGRES_DB: pharma_db
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pharma -d pharma_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - pharma_net

  notifier:
    build:
      context: .
    container_name: notifier_service
    restart: unless-stopped
    command: ["python", "notifier_service/notify.py"]
    ports:
      - "5001:5001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5001/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - pharma_net

  app:
    build:
      context: .
    container_name: pharma_app
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg2://pharma:pharma_pw@db:5432/pharma_db
      NOTIFIER_URL: http://notifier:5001/notify
      SECRET_KEY: exam-secret
    depends_on:
      db:
        condition: service_healthy
      notifier:
        condition: service_healthy
    ports:
      - "5000:5000"
    volumes:
      - app_uploads:/app/app/uploads
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - pharma_net

volumes:
  db_data:
  app_uploads:

networks:
  pharma_net:
    name: pharma_net
    driver: bridge
